{% extends "layout.html" %} {% block content %}
<div class="container text-center">
    <h1 style="font-size: 60px; color: #f1c40f; margin: 40px 0; font-family: 'Amiri', serif;">مكتبة المعرفة الرقمية</h1>

    <div class="row justify-content-center" style="display: flex; flex-wrap: wrap; gap: 20px;">
        {% for book in books %}
        <div style="width: 300px; margin-bottom: 40px;">
            <a href="{{ url_for('book_details', book_id=book.id) }}" style="text-decoration: none;">
                <div class="card" style="background: rgba(0,0,0,0.8); border: 2px solid #f1c40f; border-radius: 15px; overflow: hidden; height: 100%;">
                    <img src="{{ url_for('static', filename='images/' + book.image) }}" style="width: 100%; height: 400px; object-fit: cover; display: block;">
                    <div class="card-body" style="padding: 15px;">
                        <h3 style="color: #f1c40f; margin: 0;">{{ book.title }}</h3>
                        <p style="color: #ecc30a; margin: 5px 0 0;">{{ book.author }}</p>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
