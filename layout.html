<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="background-image: url('{{ url_for('static', filename='images/background.jpg') }}'); background-size: cover; background-attachment: fixed;">
    <div class="overlay" style="background: rgba(0,0,0,0.7); min-height: 100vh;">
        <nav class="navbar" style="padding: 10px 30px;background-color: #000">
            <div class="container-fluid d-flex justify-content-between align-items-center">

                <!-- الأعضاء (يسار) -->
                <a href="{{ url_for('members_page') }}" style="color: #f1c40f; text-decoration: none; display: flex; flex-direction: column; align-items: center;">
                    <i class="fas fa-users" style="font-size: 28px;"></i>
                    <span style="font-size: 14px;">الأعضاء</span>
                </a>

                <!-- الصفحة الرئيسية (يمين) -->
                <a href="{{ url_for('index') }}" style="color: #f1c40f; text-decoration: none; display: flex; flex-direction: column; align-items: center;">
                    <i class="fas fa-home" style="font-size: 28px;"></i>
                    <span style="font-size: 14px;">الرئيسية</span>
                </a>

            </div>
        </nav>

        {% block content %} {% endblock %}
    </div>
</body>

</html>
