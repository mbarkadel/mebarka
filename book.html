{% extends "layout.html" %} {% block content %}
<div class="container py-5 text-white" style="direction: rtl; font-family: 'Amiri', serif;">
    <div class="row">

        <div class="col-md-5">
            <div class="card p-3 shadow-lg" style="background: rgba(0,0,0,0.7); border: 2px solid #f1c40f; border-radius: 20px;">
                <img src="{{ url_for('static', filename='images/' + book.image) }}" style="width: 100%; height: 450px; object-fit: cover; border-radius: 15px; border: 1px solid #f1c40f;">

                <div class="mt-4 text-center">
                    <h2 style="color: #f1c40f; font-weight: bold;">{{ book.title }}</h2>
                    <p style="font-size: 20px;"><strong>المؤلف:</strong> مارك لوتز</p>
                    <p style="font-size: 20px;"><strong>الحالة:</strong>
                        <span style="color: {{ '#e74c3c' if book.is_borrowed else '#2ecc71' }}; font-weight: bold;">
                            {{ "مستعار" if book.is_borrowed else "متاح" }}
                        </span>
                    </p>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 shadow-lg" style="background: rgba(0,0,0,0.85); border: 2px solid #f1c40f; border-radius: 25px;">
                <h3 class="text-center mb-4" style="color: #f1c40f;">إدخال معلومات الاستعارة</h3>

                <form action="{{ url_for('confirm_borrow', book_id=book.id) }}" method="POST">
                    <div class="p-3 mb-4" style="border: 1px dashed #f1c40f; border-radius: 15px;">
                        <div class="row">
                            <div class="col-md-6 mb-3 text-right">
                                <label>الاسم:</label>
                                <input type="text" name="fname" class="form-control" style="background: #333; color: white; border: 1px solid #555;" required>
                            </div>
                            <div class="col-md-6 mb-3 text-right">
                                <label>اللقب:</label>
                                <input type="text" name="lname" class="form-control" style="background: #333; color: white; border: 1px solid #555;" required>
                            </div>
                        </div>

                        <div class="mb-3 text-right">
                            <label>البريد الإلكتروني:</label>
                            <input type="email" name="email" class="form-control" style="background: #333; color: white; border: 1px solid #555;" required>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3 text-right">
                                <label>التخصص (السنة):</label>
                                <input type="text" name="year" class="form-control" style="background: #333; color: white; border: 1px solid #555;" required>
                            </div>
                            <div class="col-md-4 mb-3 text-right">
                                <label>رقم الهاتف:</label>
                                <input type="text" name="phone" class="form-control" style="background: #333; color: white; border: 1px solid #555;" required>
                            </div>
                            <div class="col-md-4 mb-3 text-right">
                                <label>اليوم:</label>
                                <input type="text" name="day" class="form-control" placeholder="مثلاً: الخميس" style="background: #333; color: white; border: 1px solid #555;">
                            </div>
                        </div>
                    </div>

                    <div class="p-2" style="border: 1px solid #f1c40f; border-radius: 15px;">
                        {% if book.is_borrowed %}
                        <button type="button" class="btn btn-secondary w-100 disabled" style="font-size: 24px;">هذا الكتاب غير متاح حالياً</button> {% else %}
                        <button type="submit" class="btn btn-warning w-100" style="font-size: 28px; font-weight: bold; background: #f1c40f; color: black;">
                                تأكيد استعارة الكتاب
                            </button> {% endif %}
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
